name: Auberry Daily Report

on:
  schedule:
    # 11:30 PM to 11:50 PM America/New_York during daylight saving time
    - cron: "30 3 * * *"
    - cron: "40 3 * * *"
    - cron: "50 3 * * *"
    # 12:00 AM America/New_York during daylight saving time (retry window)
    - cron: "0 4 * * *"
    # 11:30 PM to 11:50 PM America/New_York during standard time
    - cron: "30 4 * * *"
    - cron: "40 4 * * *"
    - cron: "50 4 * * *"
    # 12:00 AM America/New_York during standard time (retry window)
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    concurrency:
      group: auberry-daily-report
      cancel-in-progress: false
    steps:
      - name: Decide whether this run should send
        id: schedule_guard
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const workflowFile = '.github/workflows/daily-report.yml';
            const now = new Date();

            function getNewYorkParts(date) {
              const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: 'America/New_York',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hourCycle: 'h23',
              });
              return Object.fromEntries(
                formatter
                  .formatToParts(date)
                  .filter((part) => part.type !== 'literal')
                  .map((part) => [part.type, part.value])
              );
            }

            function minutesFromMidnight(parts) {
              return Number(parts.hour) * 60 + Number(parts.minute);
            }

            const nyParts = getNewYorkParts(now);
            const currentMinutes = minutesFromMidnight(nyParts);
            const primaryWindowStart = 23 * 60 + 30;
            const primaryWindowEnd = 23 * 60 + 59;
            const backupWindowStart = 0;
            const backupWindowEnd = 20;

            let slot = '';
            if (currentMinutes >= primaryWindowStart && currentMinutes <= primaryWindowEnd) {
              slot = 'primary';
            } else if (currentMinutes >= backupWindowStart && currentMinutes <= backupWindowEnd) {
              slot = 'backup';
            }

            if (!slot) {
              core.notice(`Skipping off-window cron at New York time ${nyParts.hour}:${nyParts.minute}.`);
              core.setOutput('should_send', 'false');
              return;
            }

            const recentRuns = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowFile,
              per_page: 100,
            });

            const cutoff = now.getTime() - (3 * 60 * 60 * 1000);
            const priorSuccess = recentRuns.find((run) => {
              if (run.id === context.runId) {
                return false;
              }
              if (run.event !== 'schedule' || run.conclusion !== 'success') {
                return false;
              }
              const updatedAt = Date.parse(run.updated_at || run.created_at);
              return Number.isFinite(updatedAt) && updatedAt >= cutoff;
            });

            if (priorSuccess) {
              core.notice(`Skipping ${slot} run because scheduled run ${priorSuccess.id} already succeeded recently.`);
              core.setOutput('should_send', 'false');
              return;
            }

            core.notice(`Proceeding with ${slot} send window at New York time ${nyParts.hour}:${nyParts.minute}.`);
            core.setOutput('should_send', 'true');

      - name: Check out repository
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_send == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_send == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_send == 'true'
        run: python -m pip install -r requirements.txt

      - name: Write environment file
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_send == 'true'
        run: |
          cat <<'EOF' > .env
          GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          AUBERRY_PLACE_ID=${{ secrets.AUBERRY_PLACE_ID }}
          AUBERRY_BRAND_NAME=${{ secrets.AUBERRY_BRAND_NAME }}
          REPORT_RECIPIENT=${{ secrets.REPORT_RECIPIENT }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
          EOF

      - name: Generate and send report
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_send == 'true'
        run: python send_report.py
