name: Auberry Midnight Refresh

on:
  schedule:
    # Every 5 minutes during the 12 AM Asia/Kolkata refresh window
    - cron: "30,35,40,45,50,55 18 * * *"
    # 12:00 AM Asia/Kolkata retry window
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: auberry-midnight-refresh
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Write environment file
        run: |
          cat <<'EOF' > .env
          GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          AUBERRY_PLACE_ID=${{ secrets.AUBERRY_PLACE_ID }}
          AUBERRY_BRAND_NAME=${{ secrets.AUBERRY_BRAND_NAME }}
          REPORT_RECIPIENT=${{ secrets.REPORT_RECIPIENT }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
          EOF

      - name: Refresh dashboard site
        run: python publish_dashboard.py
