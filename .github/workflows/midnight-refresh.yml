name: Auberry Midnight Refresh

on:
  schedule:
    # Every 5 minutes from midnight IST through the early morning retry window
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: auberry-midnight-refresh
      cancel-in-progress: false
    steps:
      - name: Decide whether this run should refresh
        id: schedule_guard
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const workflowFile = '.github/workflows/midnight-refresh.yml';
            const now = new Date();

            function getKolkataParts(date) {
              const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: 'Asia/Kolkata',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hourCycle: 'h23',
              });
              return Object.fromEntries(
                formatter
                  .formatToParts(date)
                  .filter((part) => part.type !== 'literal')
                  .map((part) => [part.type, part.value])
              );
            }

            function minutesFromMidnight(parts) {
              return Number(parts.hour) * 60 + Number(parts.minute);
            }

            const istParts = getKolkataParts(now);
            const currentMinutes = minutesFromMidnight(istParts);
            const primaryWindowStart = 0;
            const primaryWindowEnd = 8 * 60 + 55;

            if (currentMinutes < primaryWindowStart || currentMinutes > primaryWindowEnd) {
              core.notice(`Skipping off-window cron at Kolkata time ${istParts.hour}:${istParts.minute}.`);
              core.setOutput('should_run', 'false');
              return;
            }

            const recentRuns = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowFile,
              per_page: 100,
            });

            const todayKey = `${istParts.year}-${istParts.month}-${istParts.day}`;
            const priorSuccess = recentRuns.find((run) => {
              if (run.id === context.runId) {
                return false;
              }
              if (run.event !== 'schedule' || run.conclusion !== 'success') {
                return false;
              }
              const runDate = new Date(run.created_at);
              const parts = getKolkataParts(runDate);
              const runKey = `${parts.year}-${parts.month}-${parts.day}`;
              return runKey === todayKey;
            });

            if (priorSuccess) {
              core.notice(`Skipping because scheduled run ${priorSuccess.id} already succeeded today in Kolkata time.`);
              core.setOutput('should_run', 'false');
              return;
            }

            core.notice(`Proceeding with refresh at Kolkata time ${istParts.hour}:${istParts.minute}.`);
            core.setOutput('should_run', 'true');

      - name: Check out repository
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Write environment file
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_run == 'true'
        run: |
          cat <<'EOF' > .env
          GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          AUBERRY_PLACE_ID=${{ secrets.AUBERRY_PLACE_ID }}
          AUBERRY_BRAND_NAME=${{ secrets.AUBERRY_BRAND_NAME }}
          REPORT_RECIPIENT=${{ secrets.REPORT_RECIPIENT }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
          REQUIRE_REPORT_REVIEWS=1
          EOF

      - name: Generate dashboard site
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_run == 'true'
        run: python publish_dashboard.py

      - name: Configure Pages
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: github.event_name != 'schedule' || steps.schedule_guard.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
